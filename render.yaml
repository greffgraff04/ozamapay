services:
  - type: web
    name: ozamapay-backend
    env: node
    rootDir: backend
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: node dist/main
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: OZAMAPAY_MASTER_ID
        sync: false
      - key: BACKEND_URL
        sync: false
